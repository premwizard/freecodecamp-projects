<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Form</title>
</head>
<body>

    <h1 id="title">Survey Form</h1>
    <p id="description">Please fill out this survey form.</p>

    <form id="survey-form">
        
        <label id="name-label" for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label id="email-label" for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label id="number-label" for="number">Age:</label>
        <input type="number" id="number" name="age" placeholder="Enter your age" min="18" max="100">

        <label for="dropdown">Select your field:</label>
        <select id="dropdown" name="field">
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
        </select>

        <p>Choose your gender:</p>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label>

        <p>Select your interests:</p>
        <input type="checkbox" name="interest" value="coding" id="coding">
        <label for="coding">Coding</label>

        <input type="checkbox" name="interest" value="design" id="design">
        <label for="design">Design</label>

        <label for="comments">Additional Comments:</label>
        <textarea id="comments" name="comments" placeholder="Write your feedback here..."></textarea>

        <button type="submit" id="submit">Submit</button>

    </form>

</body>
</html>
