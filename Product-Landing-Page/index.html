<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Product Landing Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header Section -->
  <header id="header">
    <img id="header-img" src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" alt="Logo"/>
    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Watch</a>
      <a class="nav-link" href="#contact">Contact</a>
    </nav>
  </header>

  <!-- Features Section -->
  <section id="features">
    <h2>Amazing Features</h2>
    <p>Our product is fast, secure, and reliable. Built with love and modern tech.</p>
  </section>

  <!-- Video Section -->
  <section id="video-section">
    <h2>See It In Action</h2>
    <iframe
      id="video"
      width="560"
      height="315"
      src="https://www.youtube.com/embed/dQw4w9WgXcQ"
      title="Product Video"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </section>

  <!-- Contact / Form Section -->
  <section id="contact">
    <h2>Stay Updated</h2>
    <form id="form" action="https://www.freecodecamp.com/email-submit">
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required />
      <input type="submit" id="submit" value="Subscribe" />
    </form>
  </section>

</body>
</html>
